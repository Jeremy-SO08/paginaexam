<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="logim.css">
    <title>Login</title>
</head>
<body>

    <div class="login-container">

        <img src="7fafe318-1b2d-4f32-b489-d8d3fe2a63b3.png" class="logo">

        <h2>Iniciar Sesión      </h2>

        <form id="loginForm">

            <div class="input-group">
                <label for="email">Usuario</label>
                <input type="text" id="email" placeholder="Ingresa tu usuario">
            </div>

            <div class="input-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" class="btn-login">
    Entrar
</button>

            <div class="extra-links">
                <p><a href="#">¿Olvidaste tu contraseña?</a></p>
                <p>¿No tienes una cuenta? <a href="registro.html">Regístrate</a></p>
            </div>

        </form>
    </div>
<script src="login.js" defer></script>
</body>
</html>
