<!DOCTYPE html>
<html lang="es">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Perfil</title>
    <link rel="stylesheet" href="editar.css">
</head>
<body>

<div class="contenedor">

    <h1>Editar Perfil</h1>

<script src="editar.js"></script>
</body>
